services:
  postgres:
    image: postgres:16-alpine
    container_name: jawhara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jawhara
      POSTGRES_PASSWORD: jawhara_dev_pwd
      POSTGRES_DB: jawhara_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jawhara"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jawhara_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  adminer:
    image: adminer:latest
    container_name: jawhara_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
